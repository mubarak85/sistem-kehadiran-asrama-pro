<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sistem Scanner Kehadiran Asrama</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Pustaka Kamera Yang Stabil & Selamat -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden my-auto">
    <!-- Header -->
    <div class="bg-blue-600 p-5 text-white text-center relative">
      <h1 class="text-xl font-bold tracking-wide">SCANNER LIVE GITHUB</h1>
      <p class="text-xs text-blue-200 mt-1">Imbasan Kamera Video Langsung & Pantas</p>
      
      <!-- BUTANG TUKAR KAMERA (Hanya muncul selepas kamera aktif) -->
      <button id="btn-tukar-kamera" onclick="tukarKamera()" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/30 text-white p-2.5 rounded-full transition-all cursor-pointer text-xs flex items-center gap-1 border border-white/30 font-semibold shadow-sm">
        🔄 <span class="hidden sm:inline">Tukar Kamera</span>
      </button>
    </div>

    <div class="p-5 space-y-4">
      <!-- PETAK VIEWPORT KAMERA SCANNER -->
      <div class="text-center space-y-2">
        <div class="relative w-full rounded-xl overflow-hidden bg-black min-h-[320px] border-2 border-blue-500 shadow-md flex items-center justify-center">
          
          <div id="reader" class="w-full h-full"></div>
          
          <!-- BUTANG PINTAS USER GESTURE -->
          <div id="overlay-mula" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center p-6 text-center z-50">
            <p class="text-white text-sm font-semibold mb-4">Klik butang di bawah untuk mengaktifkan kamera peranti.</p>
            <button onclick="mulaKameraGitHub()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg transition-all cursor-pointer flex items-center gap-2 text-sm uppercase tracking-wider">
              📷 Aktifkan Kamera Live
            </button>
          </div>
          
        </div>
        <p class="text-xs text-gray-500 font-medium">⚡ Halakan Kod QR pelajar terus ke dalam petak kamera</p>
      </div>

      <!-- CARIAN MANUAL KECEMASAN -->
      <details class="group border-t pt-2">
        <summary class="list-none flex justify-between items-center font-semibold text-xs text-gray-400 cursor-pointer py-1 select-none">
          <span>✏️ Taip ID Manual (Jika Perlu)</span>
          <span class="transition group-open:rotate-180 text-[10px]">▼</span>
        </summary>
        <div class="flex gap-2 mt-2">
          <input type="text" id="id-manual" placeholder="Contoh: ID123" class="w-full px-3 py-1.5 border rounded-lg text-sm uppercase font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
          <button onclick="hantarIDManual()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold px-4 py-1.5 rounded-lg text-sm transition-all cursor-pointer">Semak</button>
        </div>
      </details>
    </div>

    <!-- PENGESAHAN STATUS & DATA PELAJAR -->
    <div class="p-5 border-t border-slate-100 bg-slate-50/50 min-h-[110px]">
      <div id="notifikasi-badge" class="hidden text-center py-2 px-4 rounded-full font-bold text-sm mb-3"></div>

      <div id="kotak-maklumat" class="hidden space-y-2 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
        <h3 class="text-center font-bold text-slate-500 uppercase tracking-wider text-[11px] border-b pb-1 mb-2">Data Kemasukan Pelajar</h3>
        <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">No. ID</span><span class="col-span-2 font-mono font-bold text-slate-800" id="data-id">-</span></div>
        <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Nama</span><span class="col-span-2 font-bold text-slate-800" id="data-nama">-</span></div>
        <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Tingkatan</span><span class="col-span-2 font-bold text-slate-700" id="data-tingkatan">-</span></div>
        <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Kelas</span><span class="col-span-2 font-bold text-slate-700" id="data-kelas">-</span></div>
        <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Dorm</span><span class="col-span-2 font-bold text-blue-600" id="data-dorm">-</span></div>
        <div class="grid grid-cols-3 text-sm pt-1 mt-1 border-t items-center"><span class="text-gray-400">Status</span><span class="col-span-2"><span id="data-status" class="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-0.5 rounded font-black tracking-wider uppercase inline-block">-</span></span></div>
        <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Masa Rekod</span><span class="col-span-2 font-mono text-xs font-bold text-slate-500" id="data-masa">-</span></div>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode;
    let sedangMemproses = false;
    let modKameraSekarang = "environment"; // Lalai asal: Kamera belakang

    const configKamera = { 
      fps: 24, 
      qrbox: function(viewfinderWidth, viewfinderHeight) {
        let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        let edgeSize = Math.floor(minEdge * 0.75); 
        return { width: edgeSize, height: edgeSize };
      }
    };

    function mulaKameraGitHub() {
      document.getElementById('overlay-mula').style.display = 'none';
      html5QrCode = new Html5Qrcode("reader");
      jalankanKamera(modKameraSekarang);
    }

    function jalankanKamera(facingModeTarget) {
      html5QrCode.start(
        { facingMode: facingModeTarget }, 
        configKamera,
        (decodedText) => {
          if (!sedangMemproses) {
            try {
              let context = new (window.AudioContext || window.webkitAudioContext)();
              let osc = context.createOscillator();
              osc.connect(context.destination);
              osc.start();
              setTimeout(() => osc.stop(), 100);
            } catch(e) {}
            prosesPenghantaranData(decodedText.trim());
          }
        },
        (errorMessage) => {}
      ).then(() => {
        // Tunjukkan butang tukar kamera selepas kamera berjaya dibuka
        document.getElementById("btn-tukar-kamera").classList.remove("hidden");
      }).catch((err) => {
        document.getElementById('overlay-mula').style.display = 'flex';
        alert("Gagal Akses Kamera.");
      });
    }

    // FUNGSI UTAMA UNTUK TUKAR KAMERA LIVE
    function tukarKamera() {
      if (!html5QrCode) return;
      
      // Tukar mod antara "environment" (belakang) dan "user" (depan)
      modKameraSekarang = (modKameraSekarang === "environment") ? "user" : "environment";
      
      // Hentikan kamera semasa dahulu, kemudian buka semula dengan mod baharu
      html5QrCode.stop().then(() => {
        jalankanKamera(modKameraSekarang);
      }).catch(err => console.error("Gagal menukar kamera:", err));
    }

    function hantarIDManual() {
      const idInput = document.getElementById("id-manual").value.trim();
      if (idInput) prosesPenghantaranData(idInput);
    }

    function prosesPenghantaranData(idDitemui) {
      if (sedangMemproses) return;
      sedangMemproses = true; 

      const lencanaStatus = document.getElementById("notifikasi-badge");
      lencanaStatus.className = "text-center py-2 px-4 rounded-full font-bold text-sm mb-3 bg-amber-100 text-amber-800 block animate-pulse";
      lencanaStatus.innerText = "Memproses ID: " + idDitemui + "...";

      // ⚠️ GANTIKAN DENGAN URL APPS SCRIPT NEW DEPLOYMENT ANDA
      const urlAPI = "https://script.google.com/macros/s/AKfycbzg8iycl-XhILSu2yaddY_fqY3xXqZ2xf8gf9lCALKsZlUvMOHPtLTY1lX04_SiSPbL/exec";

      fetch(urlAPI, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ idPelajar: idDitemui })
      })
      .then(response => {
        if (!response.ok) throw new Error('Ralat Pelayan');
        return response.json();
      })
      .then(data => {
        if (data.status === "SUCCESS") {
          lencanaStatus.className = "text-center py-2 px-4 rounded-full font-bold text-sm mb-3 block bg-emerald-100 text-emerald-800";
          lencanaStatus.innerText = "✓ REKOD BERJAYA DIHANTAR!";
          
          document.getElementById("data-id").innerText = idDitemui;
          document.getElementById("data-nama").innerText = data.nama;
          document.getElementById("data-tingkatan").innerText = data.tingkatan;
          document.getElementById("data-kelas").innerText = data.kelas;
          document.getElementById("data-dorm").innerText = data.dorm;
          document.getElementById("data-status").innerText = data.statusHadir;
          document.getElementById("data-masa").innerText = new Date().toLocaleTimeString('ms-MY', {hour: '2-digit', minute:'2-digit'});
        } else {
          lencanaStatus.className = "text-center py-2 px-4 rounded-full font-bold text-sm mb-3 block bg-rose-100 text-rose-800";
          lencanaStatus.innerText = "❌ ID TIADA DALAM DATABASE";
        }
        
        document.getElementById("kotak-maklumat").classList.remove("hidden");
        document.getElementById("id-manual").value = "";

        setTimeout(() => {
          sedangMemproses = false;
          lencanaStatus.classList.add("hidden");
        }, 2500);
      })
      .catch((error) => {
        console.error("Ralat:", error);
        lencanaStatus.className = "text-center py-2 px-4 rounded-full font-bold text-sm mb-3 bg-rose-600 text-white block";
        lencanaStatus.innerText = "❌ RALAT RANGKAIAN (RE-DEPLOY APPS SCRIPT)";
        sedangMemproses = false;
      });
    }
  </script>
</body>
</html>
