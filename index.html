<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelScan Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-4">

<div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
  <!-- BAHAGIAN KIRI: SCAN & MANUAL -->
  <div class="lg:col-span-5 space-y-6">
    <div class="bg-white p-5 rounded-2xl shadow-xl">
      <h1 class="text-xl font-bold mb-4 text-center">HOSTELSCAN PRO</h1>
      <div class="flex gap-2 mb-4">
        <button id="btn-masuk" onclick="setModPergerakan('MASUK')" class="w-full py-2 bg-emerald-600 text-white rounded-lg font-bold">MODE: MASUK</button>
        <button id="btn-keluar" onclick="setModPergerakan('KELUAR')" class="w-full py-2 bg-red-600 text-white rounded-lg font-bold">MODE: KELUAR</button>
      </div>
      <div id="reader" class="rounded-xl overflow-hidden bg-black mb-4"></div>
      <button onclick="mulaKamera()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Aktifkan Kamera</button>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-xl">
      <h3 class="font-bold mb-2">Taip ID Manual</h3>
      <div class="flex gap-2">
        <input type="text" id="id-manual" class="border p-2 w-full rounded-lg" placeholder="CONTOH: TB2024001">
        <button onclick="prosesManual()" class="bg-slate-800 text-white px-4 py-2 rounded-lg">Semak</button>
      </div>
      <div id="paparan-info" class="mt-4 p-4 bg-slate-50 rounded-xl hidden">
        <p>Nama: <span id="info-nama" class="font-bold"></span></p>
        <p>Dorm: <span id="info-dorm" class="font-bold"></span></p>
      </div>
    </div>
  </div>

  <!-- BAHAGIAN KANAN: STATISTIK & JADUAL -->
  <div class="lg:col-span-7 space-y-6">
    <input type="date" id="pilih-tarikh" onchange="muatNaikStatistik()" class="w-full p-2 border rounded-xl">
    
    <!-- ANALISA -->
    <div class="bg-white p-6 rounded-2xl shadow-xl grid grid-cols-3 gap-4 text-center">
      <div><p class="text-xs">Jumlah</p><p id="stat-total" class="text-2xl font-black">0</p></div>
      <div><p class="text-xs text-emerald-600">Masuk</p><p id="stat-masuk" class="text-2xl font-black text-emerald-700">0</p></div>
      <div><p class="text-xs text-red-600">Keluar</p><p id="stat-keluar" class="text-2xl font-black text-red-700">0</p></div>
    </div>

    <!-- JADUAL BELUM MASUK -->
    <div class="bg-white p-6 rounded-2xl shadow-xl">
      <h2 class="font-bold text-lg mb-4 text-emerald-700">📥 Senarai Belum Masuk</h2>
      <table class="w-full text-sm">
        <thead><tr class="text-left text-slate-400"><th>Nama</th><th>Ting</th><th>Dorm</th></tr></thead>
        <tbody id="jadual-belum-masuk"></tbody>
      </table>
    </div>

    <!-- JADUAL BELUM KELUAR -->
    <div class="bg-white p-6 rounded-2xl shadow-xl">
      <h2 class="font-bold text-lg mb-4 text-red-700">📤 Senarai Belum Keluar</h2>
      <table class="w-full text-sm">
        <thead><tr class="text-left text-slate-400"><th>Nama</th><th>Ting</th><th>Dorm</th></tr></thead>
        <tbody id="jadual-belum-keluar"></tbody>
      </table>
    </div>
  </div>
</div>

<audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<script>
  let statusSemasa = "MASUK";
  const urlAPI = "https://script.google.com/macros/s/AKfycbzjx7uH6hX4IUV6c2D716uAhDWYHJ7XCHdsSBucoX8HOxhMiggk0hC0BZms-bA6EqVH/exec";

  function playBeep() { document.getElementById('beep-sound').play(); }
  function setModPergerakan(mod) { statusSemasa = mod; alert("Mod ditukar ke: " + mod); }

  function muatNaikStatistik() {
    const tarikh = document.getElementById("pilih-tarikh").value || new Date().toISOString().split('T')[0];
    fetch(`${urlAPI}?tarikh=${tarikh}`).then(res => res.json()).then(data => {
      document.getElementById("stat-total").innerText = data.keseluruhan.total;
      document.getElementById("stat-masuk").innerText = data.keseluruhan.masuk;
      document.getElementById("stat-keluar").innerText = data.keseluruhan.keluar;

      const tbodyMasuk = document.getElementById("jadual-belum-masuk");
      const tbodyKeluar = document.getElementById("jadual-belum-keluar");
      tbodyMasuk.innerHTML = ""; tbodyKeluar.innerHTML = "";
      
      (data.belumMasuk || []).forEach(p => {
        const row = `<tr><td class="p-2">${p.nama}</td><td class="p-2">${p.tingkatan}</td><td class="p-2">${p.dorm}</td></tr>`;
        if (p.statusTerakhir === "KELUAR") tbodyMasuk.innerHTML += row;
        else if (p.statusTerakhir === "MASUK") tbodyKeluar.innerHTML += row;
      });
    });
  }

  function prosesManual() {
    const id = document.getElementById("id-manual").value;
    if(!id) return;
    playBeep();
    fetch(urlAPI, { method: "POST", body: JSON.stringify({ idPelajar: id, arahPergerakan: statusSemasa }) })
    .then(res => res.json()).then(data => {
      alert("Berjaya: " + data.nama);
      document.getElementById("paparan-info").classList.remove("hidden");
      document.getElementById("info-nama").innerText = data.nama;
      document.getElementById("info-dorm").innerText = data.dorm;
      muatNaikStatistik();
    });
  }

  function mulaKamera() {
    new Html5Qrcode("reader").start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
      document.getElementById("id-manual").value = t;
      prosesManual();
    });
  }

  window.onload = () => { document.getElementById('pilih-tarikh').value = new Date().toISOString().split('T')[0]; muatNaikStatistik(); };
</script>
</body>
</html>
