<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelScan Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-4">

<div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
  <!-- BAHAGIAN KIRI: SCAN & MANUAL -->
  <div class="lg:col-span-5 space-y-6">
    <div class="bg-white p-5 rounded-2xl shadow-xl">
      <h1 class="text-xl font-bold mb-4 text-center">HOSTELSCAN PRO</h1>
      <div class="flex gap-2 mb-4">
        <button id="btn-masuk" onclick="setModPergerakan('MASUK')" class="w-full py-2 bg-emerald-600 text-white rounded-lg font-bold">MASUK</button>
        <button id="btn-keluar" onclick="setModPergerakan('KELUAR')" class="w-full py-2 bg-slate-200 text-slate-600 rounded-lg font-bold">KELUAR</button>
      </div>
      <div id="reader" class="rounded-xl overflow-hidden bg-black mb-4"></div>
      <button onclick="mulaKamera()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Aktifkan Kamera</button>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-xl">
      <h3 class="font-bold mb-2">Taip ID Manual</h3>
      <div class="flex gap-2">
        <input type="text" id="id-manual" class="border p-2 w-full rounded-lg" placeholder="CONTOH: TB2024001">
        <button onclick="prosesManual()" class="bg-slate-800 text-white px-4 py-2 rounded-lg">Semak</button>
      </div>
      <div id="paparan-info" class="mt-4 p-4 bg-slate-50 rounded-xl hidden">
        <p>Nama: <span id="info-nama" class="font-bold"></span></p>
        <p>Dorm: <span id="info-dorm" class="font-bold"></span></p>
      </div>
    </div>
  </div>

  <!-- BAHAGIAN KANAN: STATISTIK & JADUAL -->
  <div class="lg:col-span-7 space-y-6">
    <input type="date" id="pilih-tarikh" onchange="muatNaikStatistik()" class="w-full p-2 border rounded-xl">
    
    <div class="bg-white p-6 rounded-2xl shadow-xl">
      <h2 id="tajuk-jadual" class="font-bold text-lg mb-4">⚠️ Senarai Belum Masuk</h2>
      <button onclick="eksportKeExcel()" class="bg-emerald-600 text-white px-4 py-1 rounded-lg text-sm mb-4">💾 Excel</button>
      <table class="w-full text-sm">
        <thead><tr class="text-left text-slate-400"><th>Nama</th><th>Ting</th><th>Dorm</th><th>Masa</th></tr></thead>
        <tbody id="jadual-data"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Audio untuk bunyi imbasan -->
<audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<script>
  let statusSemasa = "MASUK";
  const urlAPI = "https://script.google.com/macros/s/AKfycbzjx7uH6hX4IUV6c2D716uAhDWYHJ7XCHdsSBucoX8HOxhMiggk0hC0BZms-bA6EqVH/exec";

  function playBeep() {
    const audio = document.getElementById('beep-sound');
    audio.play().catch(e => console.log("Audio play prevented: ", e));
  }

  function setModPergerakan(mod) {
    statusSemasa = mod;
    document.getElementById("btn-masuk").className = mod === "MASUK" ? "w-full py-2 bg-emerald-600 text-white rounded-lg font-bold" : "w-full py-2 bg-slate-200 text-slate-600 rounded-lg font-bold";
    document.getElementById("btn-keluar").className = mod === "KELUAR" ? "w-full py-2 bg-red-600 text-white rounded-lg font-bold" : "w-full py-2 bg-slate-200 text-slate-600 rounded-lg font-bold";
    document.getElementById("tajuk-jadual").innerText = mod === "MASUK" ? "⚠️ Senarai Belum Masuk" : "🏃 Senarai Belum Keluar";
    muatNaikStatistik();
  }

  function muatNaikStatistik() {
    const tarikh = document.getElementById("pilih-tarikh").value || new Date().toISOString().split('T')[0];
    fetch(`${urlAPI}?tarikh=${tarikh}`)
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById("jadual-data");
        tbody.innerHTML = "";
        
        const senarai = data.belumMasuk || []; 
        const dataDitapis = senarai.filter(p => statusSemasa === "MASUK" ? p.statusTerakhir === "KELUAR" : p.statusTerakhir === "MASUK");
        
        if (dataDitapis.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-400 italic">Tiada data untuk dipaparkan</td></tr>';
        } else {
            dataDitapis.forEach(p => {
              tbody.innerHTML += `<tr><td class="p-2">${p.nama}</td><td class="p-2">${p.tingkatan}</td><td class="p-2">${p.dorm}</td><td class="p-2">${p.masaTerakhir}</td></tr>`;
            });
        }
      });
  }

  function prosesManual() {
    const id = document.getElementById("id-manual").value;
    if(!id) return;
    playBeep();
    fetch(urlAPI, { method: "POST", body: JSON.stringify({ idPelajar: id, arahPergerakan: statusSemasa }) })
    .then(res => res.json()).then(data => {
      alert("Berjaya: " + data.nama);
      document.getElementById("paparan-info").classList.remove("hidden");
      document.getElementById("info-nama").innerText = data.nama;
      document.getElementById("info-dorm").innerText = data.dorm;
      muatNaikStatistik();
    });
  }

  function mulaKamera() {
    new Html5Qrcode("reader").start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
      document.getElementById("id-manual").value = t;
      prosesManual();
    });
  }

  function eksportKeExcel() {
    let csv = ["Nama,Tingkatan,Dorm,Masa"];
    document.querySelectorAll("#jadual-data tr").forEach(tr => {
      let tds = tr.querySelectorAll("td");
      if(tds.length === 4) {
          let td = Array.from(tds).map(cell => cell.innerText);
          csv.push(td.join(","));
      }
    });
    const blob = new Blob(["\ufeff"+csv.join("\n")], {type: "text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Laporan_Asrama.csv";
    link.click();
  }

  window.onload = () => { 
    document.getElementById('pilih-tarikh').value = new Date().toISOString().split('T')[0]; 
    muatNaikStatistik(); 
  };
</script>
</body>
</html>
